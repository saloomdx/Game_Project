<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }
    canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas sizing
function resize() {
  const scale = Math.min(window.innerWidth / 800, window.innerHeight / 600);
  canvas.style.width = (800 * scale) + 'px';
  canvas.style.height = (600 * scale) + 'px';
}
canvas.width = 800;
canvas.height = 600;
resize();
window.addEventListener('resize', resize);

// ─── State ───────────────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAYING: 1, LEVEL_CLEAR: 2, GAME_OVER: 3 };
let state = STATE.MENU;

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: 400, y: 300, down: false };

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width;
  const sy = canvas.height / r.height;
  mouse.x = (e.clientX - r.left) * sx;
  mouse.y = (e.clientY - r.top) * sy;
});
canvas.addEventListener('mousedown', () => { mouse.down = true; });
canvas.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('click', handleClick);
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Game Variables ───────────────────────────────────────────────────────────
let player, bullets, enemyBullets, enemies, particles, score, highScore, level;
let enemiesKilled, enemiesToSpawn, spawnTimer, spawnInterval;
let shakeTimer = 0, shakeAmt = 0;
let flashTimer = 0, flashColor = '';
let levelBannerTimer = 0;
let shootCooldown = 0;
let gameTime = 0;
let bgStars = [];

// Init stars once
for (let i = 0; i < 80; i++) {
  bgStars.push({
    x: Math.random() * 800,
    y: Math.random() * 600,
    size: Math.random() * 1.5 + 0.5,
    brightness: Math.random() * 0.5 + 0.3
  });
}

highScore = parseInt(localStorage.getItem('retroShooterHS') || '0');

function initGame() {
  player = {
    x: 400, y: 300,
    r: 16,
    hp: 100, maxHp: 100,
    speed: 2.0,
    angle: 0,
    walkCycle: 0,
    invincible: 0,
    shootDelay: 0
  };
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  score = 0;
  level = 1;
  enemiesKilled = 0;
  enemiesToSpawn = totalEnemiesForLevel(level);
  spawnTimer = 0;
  spawnInterval = spawnIntervalForLevel(level);
  shootCooldown = 0;
  gameTime = 0;
  levelBannerTimer = 90;
}

function totalEnemiesForLevel(lv) { return 8 + lv * 4; }
function spawnIntervalForLevel(lv) { return Math.max(35, 110 - lv * 8); }

// ─── Enemy Definitions ───────────────────────────────────────────────────────
function enemyTypes(lv) {
  const types = ['basic'];
  if (lv >= 2) types.push('fast');
  if (lv >= 3) types.push('shooter');
  if (lv >= 5) types.push('tank');
  return types;
}

function createEnemy(lv) {
  const types = enemyTypes(lv);
  const type = types[Math.floor(Math.random() * types.length)];

  // Spawn from edges
  let x, y;
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) { x = Math.random() * 800; y = -30; }
  else if (edge === 1) { x = 830; y = Math.random() * 600; }
  else if (edge === 2) { x = Math.random() * 800; y = 630; }
  else { x = -30; y = Math.random() * 600; }

  const defs = {
    basic:   { r: 12, hp: 2,  speed: 0.32, color: '#ff4444', score: 10, shootTimer: 0, shootInterval: 0 },
    fast:    { r: 9,  hp: 1,  speed: 0.6,  color: '#ff9900', score: 15, shootTimer: 0, shootInterval: 0 },
    shooter: { r: 14, hp: 3,  speed: 0.22, color: '#cc44ff', score: 25, shootTimer: 0, shootInterval: 150 },
    tank:    { r: 20, hp: 10, speed: 0.15, color: '#44ffcc', score: 50, shootTimer: 0, shootInterval: 0 }
  };

  const def = defs[type];
  return { x, y, type, angle: 0, spinAngle: 0, ...def };
}

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + 0.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 1,
      decay: Math.random() * 0.04 + 0.02,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

// ─── Shooting ─────────────────────────────────────────────────────────────────
function playerShoot() {
  if (shootCooldown > 0) return;
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  bullets.push({
    x: player.x + Math.cos(angle) * 18,
    y: player.y + Math.sin(angle) * 18,
    vx: Math.cos(angle) * 9,
    vy: Math.sin(angle) * 9,
    r: 4,
    trail: []
  });
  shootCooldown = 10;
  flashColor = 'rgba(255,255,100,0.15)';
  flashTimer = 4;
}

function enemyShoot(e) {
  const angle = Math.atan2(player.y - e.y, player.x - e.x);
  if (e.type === 'shooter') {
    for (let d = -1; d <= 1; d++) {
      const a = angle + d * 0.3;
      enemyBullets.push({
        x: e.x + Math.cos(a) * (e.r + 5),
        y: e.y + Math.sin(a) * (e.r + 5),
        vx: Math.cos(a) * 2.2,
        vy: Math.sin(a) * 2.2,
        r: 4,
        trail: []
      });
    }
  }
}

// ─── Collision ────────────────────────────────────────────────────────────────
function circleHit(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy < (a.r + b.r) * (a.r + b.r);
}

// ─── Player damage ────────────────────────────────────────────────────────────
function damagePlayer(amt) {
  if (player.invincible > 0) return;
  player.hp -= amt;
  player.invincible = 45;
  shakeTimer = 12; shakeAmt = 6;
  flashColor = 'rgba(255,0,0,0.3)';
  flashTimer = 8;
  spawnParticles(player.x, player.y, '#ff4444', 8, 3);
  if (player.hp <= 0) {
    player.hp = 0;
    spawnParticles(player.x, player.y, '#ffffff', 20, 5);
    setTimeout(() => { state = STATE.GAME_OVER; }, 400);
  }
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  if (state !== STATE.PLAYING) return;
  gameTime++;

  // Level banner
  if (levelBannerTimer > 0) levelBannerTimer--;

  // Timers
  if (shootCooldown > 0) shootCooldown--;
  if (shakeTimer > 0) shakeTimer--;
  if (flashTimer > 0) flashTimer--;
  if (player.invincible > 0) player.invincible--;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  player.x = Math.max(player.r, Math.min(800 - player.r, player.x + dx * player.speed));
  player.y = Math.max(player.r, Math.min(600 - player.r, player.y + dy * player.speed));

  if (dx !== 0 || dy !== 0) player.walkCycle += 0.3;

  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Auto-fire on hold
  if (mouse.down) playerShoot();

  // Spawn enemies
  if (enemiesToSpawn > 0) {
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      enemies.push(createEnemy(level));
      enemiesToSpawn--;
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed;
    e.y += Math.sin(angle) * e.speed;
    e.spinAngle += (e.type === 'fast') ? 0.2 : 0.05;

    // Shooter enemy fires
    if (e.type === 'shooter') {
      e.shootTimer++;
      if (e.shootTimer >= e.shootInterval) {
        e.shootTimer = 0;
        enemyShoot(e);
      }
    }

    // Enemy hits player
    if (circleHit(e, player)) {
      damagePlayer(e.type === 'tank' ? 20 : 10);
    }
  }

  // Update player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.shift();
    b.x += b.vx; b.y += b.vy;

    if (b.x < -10 || b.x > 810 || b.y < -10 || b.y > 610) {
      bullets.splice(i, 1); continue;
    }

    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (circleHit(b, enemies[j])) {
        enemies[j].hp--;
        spawnParticles(b.x, b.y, '#ffff88', 4, 2);
        if (enemies[j].hp <= 0) {
          score += enemies[j].score;
          enemiesKilled++;
          spawnParticles(enemies[j].x, enemies[j].y, enemies[j].color, 12, 4);
          enemies.splice(j, 1);
        }
        bullets.splice(i, 1);
        hit = true; break;
      }
    }
    if (hit) continue;
  }

  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 5) b.trail.shift();
    b.x += b.vx; b.y += b.vy;

    if (b.x < -10 || b.x > 810 || b.y < -10 || b.y > 610) {
      enemyBullets.splice(i, 1); continue;
    }

    if (circleHit(b, player)) {
      damagePlayer(15);
      enemyBullets.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Check level clear
  if (enemiesToSpawn === 0 && enemies.length === 0 && state === STATE.PLAYING) {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('retroShooterHS', highScore);
    }
    state = STATE.LEVEL_CLEAR;
  }
}

// ─── Draw Helpers ─────────────────────────────────────────────────────────────
function drawPixelText(text, x, y, size, color, align = 'center') {
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawShadowText(text, x, y, size, color, shadow = '#000') {
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = shadow;
  ctx.fillText(text, x + 2, y + 2);
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);

  // Flicker if invincible
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    ctx.restore(); return;
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(2, 6, player.r * 0.8, player.r * 0.4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.arc(0, 0, player.r, 0, Math.PI * 2);
  const bodyGrad = ctx.createRadialGradient(-4, -4, 1, 0, 0, player.r);
  bodyGrad.addColorStop(0, '#6699ff');
  bodyGrad.addColorStop(1, '#2244aa');
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = '#88bbff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Legs (walk cycle)
  ctx.strokeStyle = '#4466cc';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  const legSwing = Math.sin(player.walkCycle) * 6;
  ctx.beginPath();
  ctx.moveTo(-3, 6);
  ctx.lineTo(-6, 14 + legSwing);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3, 6);
  ctx.lineTo(6, 14 - legSwing);
  ctx.stroke();

  // Aim direction / gun
  ctx.rotate(player.angle);
  ctx.fillStyle = '#aaccff';
  ctx.fillRect(8, -3, 14, 6);
  ctx.fillStyle = '#ddeeff';
  ctx.fillRect(18, -2, 6, 4);

  // Visor
  ctx.rotate(-player.angle);
  ctx.beginPath();
  ctx.arc(player.r * 0.1, -player.r * 0.2, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ccffff';
  ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(e.spinAngle);

  switch (e.type) {
    case 'basic': {
      ctx.beginPath();
      ctx.moveTo(0, -e.r);
      ctx.lineTo(e.r, 0);
      ctx.lineTo(0, e.r);
      ctx.lineTo(-e.r, 0);
      ctx.closePath();
      const g1 = ctx.createRadialGradient(0, 0, 0, 0, 0, e.r);
      g1.addColorStop(0, '#ff8888');
      g1.addColorStop(1, '#cc0000');
      ctx.fillStyle = g1;
      ctx.fill();
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      break;
    }
    case 'fast': {
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        i === 0 ? ctx.moveTo(Math.cos(a) * e.r, Math.sin(a) * e.r)
                : ctx.lineTo(Math.cos(a) * e.r, Math.sin(a) * e.r);
      }
      ctx.closePath();
      const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, e.r);
      g2.addColorStop(0, '#ffcc44');
      g2.addColorStop(1, '#cc7700');
      ctx.fillStyle = g2;
      ctx.fill();
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      break;
    }
    case 'shooter': {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        i === 0 ? ctx.moveTo(Math.cos(a) * e.r, Math.sin(a) * e.r)
                : ctx.lineTo(Math.cos(a) * e.r, Math.sin(a) * e.r);
      }
      ctx.closePath();
      const g3 = ctx.createRadialGradient(0, 0, 0, 0, 0, e.r);
      g3.addColorStop(0, '#dd88ff');
      g3.addColorStop(1, '#880099');
      ctx.fillStyle = g3;
      ctx.fill();
      ctx.strokeStyle = '#bb44ff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, e.r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff88ff';
      ctx.fill();
      break;
    }
    case 'tank': {
      ctx.beginPath();
      ctx.arc(0, 0, e.r, 0, Math.PI * 2);
      const g4 = ctx.createRadialGradient(-4, -4, 2, 0, 0, e.r);
      g4.addColorStop(0, '#88ffee');
      g4.addColorStop(1, '#007755');
      ctx.fillStyle = g4;
      ctx.fill();
      ctx.strokeStyle = '#44ffcc';
      ctx.lineWidth = 2;
      ctx.stroke();
      for (let i = 0; i < e.hp; i++) {
        const a = (i / 10) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (e.r - 4), Math.sin(a) * (e.r - 4));
        ctx.lineTo(Math.cos(a) * (e.r + 3), Math.sin(a) * (e.r + 3));
        ctx.strokeStyle = '#aaffee';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      break;
    }
  }
  ctx.restore();
}

function drawBullet(b, color) {
  for (let i = 0; i < b.trail.length; i++) {
    const alpha = (i / b.trail.length) * 0.6;
    ctx.beginPath();
    ctx.arc(b.trail[i].x, b.trail[i].y, b.r * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r + 2, 0, Math.PI * 2);
  ctx.fillStyle = color.replace(')', ',0.3)').replace('rgb', 'rgba');
  ctx.fill();
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawHUD() {
  const barW = 160, barH = 16;
  const barX = 16, barY = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  const hpRatio = player.hp / player.maxHp;
  const hpColor = hpRatio > 0.5 ? '#44ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff3333';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  drawPixelText('HP', barX + barW + 8, barY + barH / 2, 13, '#aaa', 'left');

  drawShadowText(`SCORE: ${score}`, 400, 22, 20, '#ffff44');
  drawPixelText(`LVL ${level}`, 784, 16, 16, '#44ffff', 'right');

  const remaining = enemies.length + enemiesToSpawn;
  drawPixelText(`ENEMIES: ${remaining}`, 784, 36, 13, '#ff8888', 'right');

  if (levelBannerTimer > 0) {
    const alpha = Math.min(1, levelBannerTimer / 20);
    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.5})`;
    ctx.fillRect(200, 220, 400, 80);
    ctx.globalAlpha = alpha;
    drawShadowText(`LEVEL ${level}`, 400, 255, 36, '#44ffff');
    const sub = level === 1 ? 'BEGIN!' :
                level >= 5 ? 'TANK ALERT!' :
                level >= 3 ? 'SHOOTERS INCOMING!' :
                level >= 2 ? 'FAST ENEMIES AHEAD!' : '';
    if (sub) drawShadowText(sub, 400, 285, 18, '#ffff88');
    ctx.globalAlpha = 1;
  }
}

function drawBackground() {
  ctx.fillStyle = '#070712';
  ctx.fillRect(0, 0, 800, 600);

  for (const s of bgStars) {
    const twinkle = 0.5 + 0.5 * Math.sin(gameTime * 0.03 + s.x);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${s.brightness * twinkle})`;
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(40,60,100,0.3)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  for (let x = 0; x <= 800; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke();
  }
  for (let y = 0; y <= 600; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawMenu() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, 800, 600);

  for (const s of bgStars) {
    const twinkle = 0.5 + 0.5 * Math.sin(gameTime * 0.03 + s.x);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${s.brightness * twinkle})`;
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(0,0,30,0.85)';
  ctx.fillRect(100, 60, 600, 110);
  ctx.strokeStyle = '#44ffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(100, 60, 600, 110);

  const pulse = 1 + 0.05 * Math.sin(gameTime * 0.05);
  ctx.save();
  ctx.translate(400, 115);
  ctx.scale(pulse, pulse);
  drawShadowText('RETRO SHOOTER', 0, 0, 48, '#ffffff', '#0044aa');
  ctx.restore();
  drawShadowText('★  ARCADE  ★', 400, 148, 16, '#ffff44', '#443300');

  ctx.fillStyle = 'rgba(0,0,20,0.8)';
  ctx.fillRect(60, 195, 310, 175);
  ctx.strokeStyle = '#334466';
  ctx.lineWidth = 1;
  ctx.strokeRect(60, 195, 310, 175);
  drawShadowText('CONTROLS', 215, 215, 16, '#44ffff', '#002244');
  const controls = [
    ['ARROW KEYS / WASD', 'Move'],
    ['MOUSE AIM', 'Aim'],
    ['CLICK / HOLD', 'Shoot'],
  ];
  controls.forEach(([key, val], i) => {
    drawPixelText(key, 75, 240 + i * 28, 13, '#ffff88', 'left');
    drawPixelText(val, 368, 240 + i * 28, 13, '#aaaaff', 'right');
  });
  drawPixelText('Survive waves of enemies', 215, 340, 13, '#888888', 'center');
  drawPixelText('Clear all enemies to advance', 215, 358, 13, '#888888', 'center');

  ctx.fillStyle = 'rgba(0,0,20,0.8)';
  ctx.fillRect(430, 195, 310, 175);
  ctx.strokeStyle = '#334466';
  ctx.strokeRect(430, 195, 310, 175);
  drawShadowText('ENEMY TYPES', 585, 215, 16, '#44ffff', '#002244');

  const legend = [
    { type: 'basic',   label: 'Basic   - 10pts', lv: 1 },
    { type: 'fast',    label: 'Fast    - 15pts', lv: 2 },
    { type: 'shooter', label: 'Shooter - 25pts', lv: 3 },
    { type: 'tank',    label: 'Tank    - 50pts', lv: 5 },
  ];
  legend.forEach((item, i) => {
    const ey = 242 + i * 32;
    const ex = 460;
    ctx.save();
    ctx.translate(ex, ey);
    const colors = { basic: '#ff4444', fast: '#ffaa00', shooter: '#bb44ff', tank: '#44ffcc' };
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fillStyle = colors[item.type];
    ctx.fill();
    ctx.restore();
    drawPixelText(item.label, ex + 16, ey, 13, '#cccccc', 'left');
    drawPixelText(`LV${item.lv}+`, 728, ey, 11, '#ffff44', 'right');
  });

  ctx.fillStyle = 'rgba(0,0,20,0.8)';
  ctx.fillRect(240, 395, 320, 45);
  ctx.strokeStyle = '#aa6600';
  ctx.strokeRect(240, 395, 320, 45);
  drawShadowText(`HIGH SCORE: ${highScore}`, 400, 418, 18, '#ffaa00', '#220000');

  if (Math.floor(gameTime / 25) % 2 === 0) {
    drawShadowText('CLICK TO START', 400, 475, 22, '#ffffff', '#001133');
  }
  drawPixelText('v1.0  ·  RETRO ARCADE  ·  BEST OF LUCK', 400, 510, 11, '#334455', 'center');
}

function drawLevelClear() {
  drawBackground();
  for (const e of enemies) drawEnemy(e);
  drawParticles();
  drawHUD();

  ctx.fillStyle = 'rgba(0,20,0,0.7)';
  ctx.fillRect(150, 200, 500, 200);
  ctx.strokeStyle = '#44ff44';
  ctx.lineWidth = 2;
  ctx.strokeRect(150, 200, 500, 200);

  drawShadowText('LEVEL CLEAR!', 400, 255, 40, '#44ff44', '#001100');
  drawShadowText(`Score: ${score}`, 400, 305, 22, '#ffff44', '#221100');
  if (Math.floor(gameTime / 25) % 2 === 0) {
    drawShadowText('CLICK FOR NEXT LEVEL', 400, 355, 18, '#aaffaa', '#001100');
  }
}

function drawGameOver() {
  drawBackground();
  drawParticles();

  ctx.fillStyle = 'rgba(30,0,0,0.8)';
  ctx.fillRect(150, 160, 500, 280);
  ctx.strokeStyle = '#ff3333';
  ctx.lineWidth = 2;
  ctx.strokeRect(150, 160, 500, 280);

  drawShadowText('GAME OVER', 400, 230, 44, '#ff3333', '#110000');
  drawShadowText(`SCORE: ${score}`, 400, 290, 24, '#ffff44', '#221100');
  drawShadowText(`LEVEL: ${level}`, 400, 324, 20, '#44ffff', '#001122');
  if (score >= highScore && score > 0) {
    drawShadowText('NEW HIGH SCORE!', 400, 358, 18, '#ffaa00', '#110000');
  } else {
    drawShadowText(`BEST: ${highScore}`, 400, 358, 18, '#ffaa00', '#110000');
  }
  if (Math.floor(gameTime / 25) % 2 === 0) {
    drawShadowText('CLICK TO PLAY AGAIN', 400, 400, 18, '#ff9999', '#110000');
  }
}

function handleClick() {
  if (state === STATE.MENU) {
    initGame();
    state = STATE.PLAYING;
  } else if (state === STATE.LEVEL_CLEAR) {
    level++;
    enemiesToSpawn = totalEnemiesForLevel(level);
    spawnInterval = spawnIntervalForLevel(level);
    spawnTimer = 0;
    enemies = [];
    bullets = [];
    enemyBullets = [];
    levelBannerTimer = 90;
    player.hp = Math.min(player.maxHp, player.hp + 30);
    state = STATE.PLAYING;
  } else if (state === STATE.GAME_OVER) {
    state = STATE.MENU;
  }
}

function render() {
  gameTime++;

  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * shakeAmt * 2;
    shakeY = (Math.random() - 0.5) * shakeAmt * 2;
    shakeAmt *= 0.85;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (state === STATE.MENU) {
    drawMenu();
  } else if (state === STATE.PLAYING) {
    drawBackground();
    drawParticles();
    for (const e of enemies) drawEnemy(e);
    for (const b of bullets) drawBullet(b, 'rgb(255,255,100)');
    for (const b of enemyBullets) drawBullet(b, 'rgb(255,80,80)');
    drawPlayer();
    drawHUD();
  } else if (state === STATE.LEVEL_CLEAR) {
    drawLevelClear();
  } else if (state === STATE.GAME_OVER) {
    drawGameOver();
  }

  if (flashTimer > 0) {
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, 800, 600);
    flashTimer--;
  }

  ctx.restore();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
